<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="options-body">

  <div class="options-card">
    <header class="options-header">
      <img src="/images/icon_48.png" alt="" class="options-logo" />
      <div>
        <div class="options-title">Garmin Badge Database</div>
        <div class="options-subtitle">Settings</div>
      </div>
    </header>

    <div class="options-form">
      <div class="field">
        <label for="apiKey">API key</label>
        <input type="password" id="apiKey" placeholder="Paste your API key here" autocomplete="off" spellcheck="false" />
        <small>Find your API key on the <a href="https://garminbadges.com/dashboard" target="_blank">Dashboard</a> page after signing in.</small>
      </div>

      <div class="field">
        <label for="apiBase">API URL</label>
        <input type="url" id="apiBase" placeholder="https://garminbadges.com/api" />
        <small>Only change this for local development.</small>
      </div>
    </div>

    <div class="options-actions">
      <button id="save-btn" class="save-btn">Save</button>
      <span id="save-status" class="save-status"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
